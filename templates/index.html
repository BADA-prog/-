<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 일일 기록</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        select, button { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; border: none; font-weight: bold; cursor: pointer; }
        .log-list { list-style: none; padding: 0; }
        .log-item { background: #f9f9f9; margin-bottom: 10px; padding: 15px; border-radius: 8px; border: 1px solid #eee; display: flex; justify-content: space-between; }
        .time { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <h2>🐾 우리집 고양이 기록장</h2>

    <form action="/add" method="POST">
        <div class="form-group">
            <label>어떤 아이인가요?</label>
            <select name="cat_name">
                <option value="감자">감자</option>
                <option value="다른냥이">다른냥이</option>
            </select>
        </div>

        <div class="form-group">
            <label>무엇을 했나요?</label>
            <select name="action">
                <option value="💧 물 마심">💧 물 마심</option>
                <option value="🍚 밥 먹음">🍚 밥</option>
                <option value="🟡 화장실 (소변)">🟡 화장실 (소변)</option>
                <option value="🟤 화장실 (대변)">🟤 화장실 (대변)</option>
            </select>
        </div>

        <button type="submit">기록 추가하기</button>
    </form>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">

    <h3>최근 기록</h3>
    <ul class="log-list">
        {% for log in logs %}
        <li class="log-item">
            <span><strong>{{ log[0] }}</strong>가 {{ log[1] }}</span>
            <span class="time">{{ log[2][11:16] }}</span>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
