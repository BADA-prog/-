<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 일일 기록</title>
    <style>
        :root {
            --main-pink: #F4B6C2; /* Crumbl 특유의 핑크 */
            --card-white: #FFFFFF;
            --text-black: #000000;
        }

        body { 
            font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif; 
            background-color: var(--main-pink); 
            margin: 0; 
            padding: 24px;
            color: var(--text-black);
        }

        h2 { 
            font-size: 32px; 
            font-weight: 800; 
            margin: 10px 0 30px 0;
            letter-spacing: -1px;
        }

        .form-group { margin-bottom: 35px; }
        .label-title { font-weight: 800; font-size: 18px; margin-bottom: 15px; display: block; }

        /* 카드 그리드 시스템 (2x2 배치) */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 라디오 버튼(동그라미) 숨기기 */
        .card-grid input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* 카드 기본 스타일 */
        .card-grid label {
            background: var(--card-white);
            border-radius: 18px;
            padding: 30px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid transparent; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-grid label span { font-size: 16px; font-weight: 700; margin-top: 12px; }
        .emoji { font-size: 32px; }

        /* 선택되었을 때 스타일 */
        .card-grid input[type="radio"]:checked + label {
            border: 3.5px solid var(--text-black);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* 전송 버튼 */
        .submit-btn {
            width: 100%;
            background-color: var(--text-black);
            color: white;
            padding: 22px;
            border-radius: 40px;
            border: none;
            font-size: 18px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* 최근 기록 섹션 */
        .log-section { margin-top: 45px; }
        .log-item {
            background: rgba(255, 255, 255, 0.4);
            padding: 16px 20px;
            border-radius: 15px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .log-item strong { font-weight: 700; }
        .time { font-size: 12px; font-weight: 600; opacity: 0.6; }
    </style>
</head>
<body>

    <h2>Start a Record</h2>

    <form action="/add" method="POST">
        <div class="form-group">
            <span class="label-title">Select Cat</span>
            <div class="card-grid">
                <input type="radio" name="cat_name" id="cat1" value="감자">
                <label for="cat1">
                    <span class="emoji">🐱</span>
                    <span>감자</span>
                </label>
                
                <input type="radio" name="cat_name" id="cat2" value="우유">
                <label for="cat2">
                    <span class="emoji">🥛</span>
                    <span>우유</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <span class="label-title">Activity</span>
            <div class="card-grid">
                <input type="radio" name="action" id="act1" value="meal">
                <label for="act1">
                    <span class="emoji">🍚</span>
                    <span>Meal</span>
                </label>
                
                <input type="radio" name="action" id="act2" value="water">
                <label for="act2">
                    <span class="emoji">💧</span>
                    <span>Water</span>
                </label>
                
                <input type="radio" name="action" id="act3" value="pee">
                <label for="act3">
                    <span class="emoji">🟡</span>
                    <span>Pee</span>
                </label>
                
                <input type="radio" name="action" id="act4" value="poop">
                <label for="act4">
                    <span class="emoji">🟤</span>
                    <span>Poop</span>
                </label>
            </div>
        </div>

        <button type="submit" class="submit-btn">Add to Record</button>
    </form>

    <div class="log-section">
        <span class="label-title">Recent Activity</span>
        {% for log in logs %}
        <div class="log-item">
            <span><strong>{{ log[0] }}</strong>: {{ log[1] }}</span>
            <span class="time">{{ log[2][11:16] if log[2] and log[2]|length >= 16 else "" }}</span>
        </div>
        {% endfor %}
    </div>

</body>
</html>
